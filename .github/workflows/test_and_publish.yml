name: Tests

on:
  push:
    branches:
      - main
      - '*.*.*'

  pull_request:
    branches:
      - main
      - '*.*.*'

  release:
    types: [ published ]

jobs:

  autoflake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install packages
        run: |
          pip3 install poetry
          poetry install --all-extras --no-root

      - name: Autoflake
        run: poetry run autoflake eternaltwin/ tests/ -r -c


  isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install packages
        run: |
          pip3 install poetry
          poetry install --all-extras --no-root


      - name: Isort
        run: poetry run isort --check eternaltwin/ tests/


  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install packages
        run: |
          pip3 install poetry
          poetry install --all-extras --no-root


      - name: Black
        run: poetry run black --check -l 120 eternaltwin/ tests/


  pycodestyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install packages
        run: |
          pip3 install poetry
          poetry install --all-extras --no-root


      - name: Pycodestyle
        run: poetry run pycodestyle eternaltwin/ tests/


  pydocstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install packages
        run: |
          pip3 install poetry
          poetry install --all-extras --no-root


      - name: Pydocstyle
        run: poetry run pydocstyle --count eternaltwin/


  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install packages
        run: |
          pip3 install poetry
          poetry install --all-extras --no-root


      - name: Mypy
        run: poetry run mypy eternaltwin --disallow-untyped-def


  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: '3.14'

      - name: Install packages
        run: |
          pip3 install poetry
          poetry install --all-extras --no-root


      - name: Bandit
        run: poetry run bandit --ini=setup.cfg -ll 2> /dev/null


  test:
    needs: [autoflake, isort, black, pycodestyle, pydocstyle, mypy, bandit]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11', '3.12', '3.13', '3.14' ]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: ${{ matrix.python-version }}

      - name: Start EternalTwin server
        run: |
          export GID=$(id -g)
          export ETWIN_PORT=$((50320 + ${{ matrix.python-version }}))
          docker compose -f docker/docker-compose.yml up --build -d

      - name: Install packages
        run: |
          pip3 install poetry
          poetry install --all-extras --no-root

      - name: Wait for EternalTwin to start
        run: |
          if ! timeout 300 bash -c 'until [ "$(docker inspect --format="{{.State.Health.Status}}" eternaltwin)" == "healthy" ]; do sleep 2; done'; then
            echo "Container failed to become healthy within 300 seconds"
            docker logs eternaltwin
            exit 1
          fi

      - name: Run tests
        run: |
          export ETWIN_PORT=$((50320 + ${{ matrix.python-version }}))
          poetry run pytest -vvv -ss --color=yes --durations=0 --durations-min=1.0 --cov=. --cov-report term
          poetry run coverage xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == 3.14
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  publish:
    needs: [ autoflake, black, isort, pycodestyle, pydocstyle, mypy, bandit, test ]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: pypi
      url: https://pypi.org/p/eternaltwinpy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install build dependencies
        run: poetry install --only main

      - name: Build distributions
        run: poetry build

      - name: Check distributions
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
