services:
  eternaltwin:
    container_name: eternaltwin
    build:
      context: eternaltwin
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    stdin_open: true
    tty: true
    ports:
      - "${ETWIN_PORT:-50320}:50320"
    healthcheck:
      test: [ "CMD", "curl", "-f", "localhost:50320/api/v1/users?limit=0" ]
      start_period: 10s
      interval: 30s
      retries: 2
      timeout: 1s
